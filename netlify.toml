# EQ Shell — Netlify config
# Phase 1.B wire-up

[build]
  publish = "dist"
  command = "corepack enable && corepack prepare pnpm@9.15.9 --activate && pnpm run check:perms && pnpm run check:css && pnpm run build"

[build.environment]
  # Lock pnpm to match packageManager field in package.json.
  # Without this, Netlify's build image defaults to pnpm 8.x which cannot
  # parse lockfileVersion 9.0 — causing exit code 2 on production builds.
  PNPM_VERSION = "9.15.9"
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/_templates/**"]
  external_node_modules = ["@sparticuz/chromium"]

[functions."*"]
  timeout = 26

# Local dev: `netlify dev` boots Vite as the target server and reverse-proxies
# it on port 8888 alongside the Netlify Functions emulator. Explicit framework
# + ports beats auto-detection — pins behaviour across Vite/netlify-cli
# upgrades. netlify-cli is not a project devDep; install globally
# (`npm install -g netlify-cli`) or invoke via `pnpx netlify-cli@^26 dev`
# / `npx netlify dev`.
[dev]
  command = "pnpm dev"
  framework = "#custom"
  targetPort = 5173
  port = 8888

# Static design token file — must be served as CSS before the SPA catch-all.
[[redirects]]
  from = "/eq-tokens.css"
  to = "/eq-tokens.css"
  status = 200
  force = true

# SPA history fallback so React Router owns all non-function routes.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://www.clarity.ms https://scripts.clarity.ms https://eu.i.posthog.com https://eu-assets.i.posthog.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://jvknxcmbtrfnxfrwfimn.supabase.co; worker-src blob:; connect-src 'self' https://jvknxcmbtrfnxfrwfimn.supabase.co https://zaapmfdkgedqupfjtchl.supabase.co https://ehowgjardagevnrluult.supabase.co https://ktmjmdzqrogauaevbktn.supabase.co https://*.ingest.sentry.io https://*.ingest.de.sentry.io https://browser.sentry-cdn.com https://eu.i.posthog.com https://eu-assets.i.posthog.com https://www.clarity.ms https://q.clarity.ms https://c.bing.com; frame-src https://eq-field.netlify.app https://field.eq.solutions https://cards.eq.solutions https://eq-solves-service.netlify.app https://service.eq.solutions https://quotes.eq.solutions; frame-ancestors 'none';"
