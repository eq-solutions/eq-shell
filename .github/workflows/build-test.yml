name: Build test (Ubuntu — temp debug)

on:
  push:
    branches: [main]

jobs:
  build:
    name: Test build on Ubuntu Noble
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack and set pnpm version
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run check:perms
        run: pnpm run check:perms

      - name: Build packages
        run: pnpm run build:packages

      - name: Build tokens
        run: pnpm run build:tokens

      - name: TypeScript check
        run: pnpm exec tsc -b

      - name: Vite build
        run: pnpm exec vite build
