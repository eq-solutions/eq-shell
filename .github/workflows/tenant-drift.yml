name: Tenant drift + anon-grant check

on:
  pull_request:
    branches:
      - main
  schedule:
    # Monday 08:00 AEST (UTC+10 standard time) = Sunday 22:00 UTC
    - cron: '0 22 * * 0'
  workflow_dispatch:
    inputs:
      anon_only:
        description: 'Skip cross-tenant drift, run anon-grant check only'
        type: boolean
        default: false

jobs:
  # Creds-free static lint: a newly-ADDED tenant-migration file must not
  # self-insert into app_data._eq_migrations (the runner is the single ledger
  # writer — see SCHEMA-GOVERNANCE.md). PR-only: it needs the PR diff to scope
  # to added files, and on schedule there is no diff. No DB secrets required.
  migration-hygiene:
    name: Migration ledger hygiene (added files)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff added files against the base
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint newly-added migrations for ledger self-inserts
        run: node scripts/check-migration-hygiene.mjs
        env:
          BASE: ${{ github.event.pull_request.base.sha }}

  drift-check:
    name: Schema drift + anon-grant invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run drift + anon-grant check
        run: |
          # --strict-spine: the canonical spine (tables created by the migrations)
          # must be identical across every tenant — drift on a spine table now FAILS
          # this check. Module/legacy-layer differences stay informational. The
          # comparison is semantic (effective RLS isolation, not policy names), so
          # cosmetic decomposition is not a false failure. Spine verified green
          # across both tenants 2026-06-04.
          FLAGS="--strict-spine"
          if [ "${{ inputs.anon_only }}" = "true" ]; then
            FLAGS="--anon-only"
          fi
          node scripts/check-tenant-drift.mjs $FLAGS
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONTROL_PROJECT_REF: ${{ secrets.CONTROL_PROJECT_REF }}
          CANONICAL_INTERNAL_PROJECT_REF: ${{ secrets.CANONICAL_INTERNAL_PROJECT_REF }}
          SKS_CANONICAL_PROJECT_REF: ${{ secrets.SKS_CANONICAL_PROJECT_REF }}
