name: Tenant drift + anon-grant check

on:
  pull_request:
    branches:
      - main
  schedule:
    # Every 3 hours. Drift on the canonical planes comes from out-of-band changes
    # (ad-hoc DDL via the dashboard / Supabase MCP), NOT from PRs — so a tight
    # scheduled cadence is the only way to catch it fast. Weekly meant a bad
    # change could sit ~7 days; 3-hourly bounds exposure to a few hours.
    # Off the :00 mark to avoid the top-of-hour API stampede.
    - cron: '7 */3 * * *'
  workflow_dispatch:
    inputs:
      anon_only:
        description: 'Skip cross-tenant drift, run anon-grant check only'
        type: boolean
        default: false

jobs:
  drift-check:
    name: Schema drift + anon-grant invariant
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run drift + anon-grant check
        run: |
          # --strict-spine: the canonical spine (tables created by the migrations)
          # must be identical across every tenant — drift on a spine table now FAILS
          # this check. Module/legacy-layer differences stay informational. The
          # comparison is semantic (effective RLS isolation, not policy names), so
          # cosmetic decomposition is not a false failure. Spine verified green
          # across both tenants 2026-06-04.
          FLAGS="--strict-spine"
          if [ "${{ inputs.anon_only }}" = "true" ]; then
            FLAGS="--anon-only"
          fi
          node scripts/check-tenant-drift.mjs $FLAGS
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONTROL_PROJECT_REF: ${{ secrets.CONTROL_PROJECT_REF }}
          CANONICAL_INTERNAL_PROJECT_REF: ${{ secrets.CANONICAL_INTERNAL_PROJECT_REF }}
          SKS_CANONICAL_PROJECT_REF: ${{ secrets.SKS_CANONICAL_PROJECT_REF }}
