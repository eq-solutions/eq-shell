name: Tenant drift + anon-grant + policy-lint check

on:
  pull_request:
    branches:
      - main
  schedule:
    # Every 3 hours. Drift on the canonical planes comes from out-of-band changes
    # (ad-hoc DDL via the dashboard / Supabase MCP), NOT from PRs — so a tight
    # scheduled cadence is the only way to catch it fast. Weekly meant a bad
    # change could sit ~7 days; 3-hourly bounds exposure to a few hours.
    # Off the :00 mark to avoid the top-of-hour API stampede.
    - cron: '7 */3 * * *'
  workflow_dispatch:
    inputs:
      anon_only:
        description: 'Skip cross-tenant drift, run anon-grant check only'
        type: boolean
        default: false

jobs:
  # Creds-free static lint: a newly-ADDED tenant-migration file must not
  # self-insert into app_data._eq_migrations (the runner is the single ledger
  # writer — see SCHEMA-GOVERNANCE.md). PR-only: it needs the PR diff to scope
  # to added files, and on schedule there is no diff. No DB secrets required.
  migration-hygiene:
    name: Migration ledger hygiene (added files)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need history to diff added files against the base
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint newly-added migrations for ledger self-inserts
        run: node scripts/check-migration-hygiene.mjs
        env:
          BASE: ${{ github.event.pull_request.base.sha }}

  drift-check:
    name: Schema drift + anon-grant + policy-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install packages
        # Required for check-orphan-perms.mjs which reads @eq-solutions/roles.
        # check-tenant-drift.mjs has no npm deps but shares the same job.
        run: pnpm install --frozen-lockfile
        env:
          # Allows pnpm to fetch the github:eq-solutions/eq-roles package.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run drift + anon-grant + policy-lint check
        run: |
          # --strict-spine: the canonical spine must be identical across every tenant.
          # Policy-lint (CHECK 5, Phase 5.2) is ABSOLUTE by default — every app_data
          # table with RLS=on and no tenant_id policy fails the build. Suppress with
          # --no-policy-lint only in exceptional circumstances.
          FLAGS="--strict-spine"
          if [ "${{ inputs.anon_only }}" = "true" ]; then
            FLAGS="--anon-only"
          fi
          node scripts/check-tenant-drift.mjs $FLAGS
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONTROL_PROJECT_REF: ${{ secrets.CONTROL_PROJECT_REF }}
          CANONICAL_INTERNAL_PROJECT_REF: ${{ secrets.CANONICAL_INTERNAL_PROJECT_REF }}
          SKS_CANONICAL_PROJECT_REF: ${{ secrets.SKS_CANONICAL_PROJECT_REF }}

      - name: Run orphan-perms check (Phase 5.3)
        # Validates that every perm_key in shell_control.security_group_perms
        # exists in the pinned @eq-solutions/roles package. An orphan key means
        # a security group silently grants nothing to its members (can() returns
        # false without an error). Skipped when running anon-only.
        if: ${{ inputs.anon_only != true }}
        run: node scripts/check-orphan-perms.mjs
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONTROL_PROJECT_REF: ${{ secrets.CONTROL_PROJECT_REF }}
