# Tenant migrations — the "One Pipe" apply path (see SCHEMA-GOVERNANCE.md).
#
# This is the ONLY sanctioned way tenant schema reaches a live tenant DB. No
# hand-applied single-tenant SQL, ever (the rule that kills drift by construction).
#
#   PR to main   → `plan` job: READ-ONLY matrix of what would apply, posted to the
#                  job summary. Never touches a tenant.
#   dispatch     → `apply` job: runs the real runner against every tenant in
#                  shell_control.tenant_routing. Gated behind the `production`
#                  GitHub Environment so it PAUSES for a human approve click
#                  before any live DDL.
#   dispatch + reconcile_ledger=true → `reconcile` job: one-time ledger normaliser
#                  (rename/dedupe/re-checksum app_data._eq_migrations; no schema or
#                  data change). Same `production` gate.
#
# WHY APPLY IS DISPATCH-ONLY (not push-on-merge): every live multi-tenant DDL run
# is an explicit, deliberate action ("never deploy without explicit instruction"),
# and it lets the one-time ledger reconcile run BEFORE the first apply without a
# merge-triggered apply racing it. Merging a migration is therefore inert until a
# human dispatches the apply.
#
# ── ONE-TIME SETUP ───────────────────────────────────────────────────────────
#   `production` environment with Royce as required reviewer — CREATED 2026-06-03.
#   The approval gate IS the protection rule; both apply and reconcile inherit it.
#
# Secrets (already configured for tenant-drift.yml):
#   SUPABASE_ACCESS_TOKEN  — Management API token (runs DDL as postgres)
#   CONTROL_PROJECT_REF    — control-plane ref (jvkn…); the runner reads
#                            tenant_routing from here to find every tenant.

name: Tenant migrations (One Pipe)

on:
  pull_request:
    branches: [main]
    paths:
      - 'supabase/tenant-migrations/**'
      - 'scripts/migrate-tenants.mjs'
      - 'scripts/_mgmt.mjs'
  workflow_dispatch:
    inputs:
      slug:
        description: 'Limit to a single tenant slug (blank = whole fleet)'
        type: string
        required: false
      reconcile_ledger:
        description: 'Run the one-time ledger reconcile instead of apply'
        type: boolean
        required: false
        default: false
      allow_checksum_drift:
        description: 'Accept changed migration files (use only to resolve accidental edits)'
        type: boolean
        required: false
        default: false

# Never let two applies overlap; never cancel an in-flight apply.
concurrency:
  group: tenant-migrate-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  plan:
    name: Plan (read-only)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Compute apply plan
        run: |
          node scripts/migrate-tenants.mjs --plan | tee plan.txt
          {
            echo '### Tenant migration plan'
            echo ''
            echo 'What a real run (dispatch) would apply. Read-only — no tenant was touched.'
            echo ''
            echo '```'
            cat plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONTROL_PROJECT_REF: ${{ secrets.CONTROL_PROJECT_REF }}

  reconcile:
    name: Reconcile tenant ledgers
    if: github.event_name == 'workflow_dispatch' && inputs.reconcile_ledger
    runs-on: ubuntu-latest
    environment: production   # same human-approval gate as apply
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Reconcile _eq_migrations ledgers
        run: |
          SLUG_FLAG=""
          if [ -n "$INPUT_SLUG" ]; then
            SLUG_FLAG="--slug=$INPUT_SLUG"
          fi
          node scripts/migrate-tenants.mjs --reconcile-ledger $SLUG_FLAG
        env:
          INPUT_SLUG: ${{ inputs.slug }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONTROL_PROJECT_REF: ${{ secrets.CONTROL_PROJECT_REF }}

  apply:
    name: Apply to all tenants
    if: github.event_name == 'workflow_dispatch' && !inputs.reconcile_ledger
    runs-on: ubuntu-latest
    # The approval gate — `production` environment with a required reviewer.
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply pending migrations
        run: |
          SLUG_FLAG=""
          if [ -n "$INPUT_SLUG" ]; then
            SLUG_FLAG="--slug=$INPUT_SLUG"
          fi
          DRIFT_FLAG=""
          if [ "$INPUT_ALLOW_CHECKSUM_DRIFT" = "true" ]; then
            DRIFT_FLAG="--allow-checksum-drift"
          fi
          node scripts/migrate-tenants.mjs $SLUG_FLAG $DRIFT_FLAG
        env:
          INPUT_SLUG: ${{ inputs.slug }}
          INPUT_ALLOW_CHECKSUM_DRIFT: ${{ inputs.allow_checksum_drift }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          CONTROL_PROJECT_REF: ${{ secrets.CONTROL_PROJECT_REF }}
