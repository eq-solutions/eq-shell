# EQ Shell pnpm workspace
#
# Includes eq-intake's @eq/* packages as workspace members via a relative path
# into the eq-intake git submodule (mounted at ./eq-intake). The packages are
# consumed at source — Vite resolves them during dev and bundles them at build
# time. No pre-build step required.
#
# Netlify build picks up the submodule automatically because GIT_LFS_ENABLED
# is not needed and Netlify clones submodules by default when .gitmodules is
# present. Run `git submodule update --init --recursive` after a fresh clone
# locally — see README.md "Cloning" section.
packages:
  - "./eq-intake/eq-platform/packages/*"
